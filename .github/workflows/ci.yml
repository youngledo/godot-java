name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        include:
          - os: macos-latest
            godot_url: https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_macos.universal.zip
            godot_exe: Godot.app/Contents/MacOS/Godot
            native_build: ./godot-java-core/native/build-macos.sh
          - os: ubuntu-latest
            godot_url: https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip
            godot_exe: Godot_v4.6.2-stable_linux.x86_64
            native_build: ./godot-java-core/native/build-linux.sh
          - os: windows-latest
            godot_url: https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_win64.exe.zip
            godot_exe: Godot_v4.6.2-stable_win64.exe
            native_build: ./godot-java-core/native/build-windows.bat

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: godot-bin
          key: godot-4.6.2-${{ runner.os }}

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p godot-bin
          curl -L -o godot-bin/godot.zip "${{ matrix.godot_url }}"
          unzip -q godot-bin/godot.zip -d godot-bin
          rm godot-bin/godot.zip
          chmod +x godot-bin/${{ matrix.godot_exe }}

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build native library (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== Building native library (macOS) ==="
          chmod +x "${{ matrix.native_build }}"
          "${{ matrix.native_build }}"
          echo "=== shared-native/ contents ==="
          ls -la godot-java-examples/examples/shared-native/ || echo "not found"
          echo "source build:"
          ls -la godot-java-core/native/build/ || echo "not found"

      - name: Build native library (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "=== Building native library (Linux) ==="
          chmod +x "${{ matrix.native_build }}"
          "${{ matrix.native_build }}"
          echo "=== shared-native/ contents ==="
          ls -la godot-java-examples/examples/shared-native/ || echo "not found"
          echo "source build:"
          ls -la godot-java-core/native/build/ || echo "not found"

      - name: Build native library (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          echo === Building native library (Windows) ===
          call "${{ matrix.native_build }}"
          echo === shared-native contents ===
          dir godot-java-examples\examples\shared-native\ 2>nul || echo not found
          echo source build:
          dir godot-java-core\native\build\ 2>nul || echo not found

      - name: Build
        run: ./mvnw clean package -DskipTests -B

      - name: Create extension_list.cfg for CI
        shell: bash
        run: |
          mkdir -p godot-java-examples/examples/it-test/.godot
          printf 'res://godot-java.gdextension\n' > godot-java-examples/examples/it-test/.godot/extension_list.cfg
          echo "extension_list.cfg contents:"
          cat godot-java-examples/examples/it-test/.godot/extension_list.cfg
          echo "--- end ---"

      - name: Copy JAR to shared-native (bash)
        if: runner.os != 'Windows'
        run: |
          echo "=== Deploying JAR to shared-native/ ==="
          mkdir -p godot-java-examples/examples/shared-native
          cp godot-java-examples/target/godot-java-examples.jar godot-java-examples/examples/shared-native/
          echo "=== shared-native/ contents ==="
          ls -la godot-java-examples/examples/shared-native/
          echo "=== it-test/native/ (symlinks) ==="
          ls -la godot-java-examples/examples/it-test/native/

      - name: Copy JAR to shared-native (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          echo === Deploying JAR to shared-native ===
          if not exist "godot-java-examples\examples\shared-native" mkdir "godot-java-examples\examples\shared-native"
          copy godot-java-examples\target\godot-java-examples.jar godot-java-examples\examples\shared-native\
          echo === shared-native contents ===
          dir godot-java-examples\examples\shared-native\

      - name: Deploy native library and JAR to it-test (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          echo "=== Copying shared-native to it-test/native (symlinks not in git) ==="
          cp godot-java-examples/examples/shared-native/godot-java-examples.jar godot-java-examples/examples/it-test/native/
          cp godot-java-examples/examples/shared-native/libgodot-java.* godot-java-examples/examples/it-test/native/ 2>/dev/null || true
          ls -la godot-java-examples/examples/it-test/native/

      - name: Deploy native library and JAR to it-test (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          echo === Copying shared-native to it-test/native ===
          copy /Y godot-java-examples\examples\shared-native\godot-java-examples.jar godot-java-examples\examples\it-test\native\
          copy /Y godot-java-examples\examples\shared-native\libgodot-java.dll godot-java-examples\examples\it-test\native\
          dir godot-java-examples\examples\it-test\native\

      - name: Verify test environment
        shell: bash
        run: |
          echo "=== .gdextension contents ==="
          cat godot-java-examples/examples/it-test/godot-java.gdextension
          echo "=== .gdextension hex dump (first line) ==="
          head -1 godot-java-examples/examples/it-test/godot-java.gdextension | xxd | head -3
          echo "=== native/ contents ==="
          ls -la godot-java-examples/examples/it-test/native/
          echo "=== extension_list.cfg ==="
          cat godot-java-examples/examples/it-test/.godot/extension_list.cfg
          echo "=== Godot binary ==="
          ls -la godot-bin/ || echo "godot-bin/ not found"
          echo "=== JAVA_HOME ==="
          echo "$JAVA_HOME"

      - name: Run all tests (macOS)
        if: runner.os == 'macOS'
        env:
          GODOT_BIN: ${{ github.workspace }}/godot-bin/Godot.app/Contents/MacOS/Godot
          GODOT_JAVA_CLASSPATH: ${{ github.workspace }}/godot-java-examples/examples/shared-native/godot-java-examples.jar
        run: ./mvnw test -pl godot-java-core -B

      - name: Run all tests (Linux)
        if: runner.os == 'Linux'
        env:
          GODOT_BIN: ${{ github.workspace }}/godot-bin/Godot_v4.6.2-stable_linux.x86_64
          GODOT_JAVA_CLASSPATH: ${{ github.workspace }}/godot-java-examples/examples/shared-native/godot-java-examples.jar
        run: ./mvnw test -pl godot-java-core -B

      - name: Run all tests (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        env:
          GODOT_BIN: ${{ github.workspace }}\godot-bin\Godot_v4.6.2-stable_win64.exe
          GODOT_JAVA_CLASSPATH: ${{ github.workspace }}\godot-java-examples\examples\shared-native\godot-java-examples.jar
        run: .\mvnw.cmd test -pl godot-java-core -B
